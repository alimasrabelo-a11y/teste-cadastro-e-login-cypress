<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Site de Teste Cypress</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    section { margin-bottom: 30px; padding: 20px; border: 1px solid #ccc; }
    button { margin-top: 10px; }
  </style>
</head>
<body>
<h1>Site de Teste para Cypress</h1>

<section id="login">
  <h2>Login</h2>
  <form>
    <label for="user">Usuário:</label>
    <input type="text" id="user" name="user"><br><br>
    <label for="pass">Senha:</label>
    <input type="password" id="pass" name="pass"><br><br>
    <button type="submit">Entrar</button>
  </form>
</section>

<section id="cadastro">
  <h2>Cadastro</h2>
  <form>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>
    <button type="submit">Cadastrar</button>
  </form>
</section>

<section id="lista">
  <h2>Lista de Itens</h2>
  <ul>
    <li>Item 1 <button>Remover</button></li>
    <li>Item 2 <button>Remover</button></li>
    <li>Item 3 <button>Remover</button></li>
  </ul>
  <button id="addItem">Adicionar Item</button>
</section>
</body>
</html>
